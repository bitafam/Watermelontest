name: Build Android App (Capacitor)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Web Dependencies
        run: |
          npm install

      - name: Build React Web App
        run: |
          npm run build

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor Android
        run: |
          # If the android folder doesn't exist, initialize and add it dynamically
          npx cap sync
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Inject Myket Intent & DeepLink configurations to AndroidManifest.xml
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            echo "Modifying AndroidManifest.xml for Myket and external Intents..."
            
            # Insert Myket schemes, deep links, and queries to AndroidManifest
            # 1. Add Myket Package Query so Myket can be queried from Android 11+
            # 2. Add custom scheme deep link (e.g., com.watermelon.detector://)
            
            # Let's insert queries block before </manifest>
            sed -i 's|<\/manifest>|<queries><package android:name="ir.mservices.market" /><\/queries><\/manifest>|g' "$MANIFEST_PATH"
            
            # Let's add an intent filter for Myket deep link within the .MainActivity activity
            INTENT_FILTER='<intent-filter><action android:name="android.intent.action.VIEW" /><category android:name="android.intent.category.DEFAULT" /><category android:name="android.intent.category.BROWSABLE" /><data android:scheme="wmqd" /></intent-filter>'
            sed -i "s|<activity|<activity>\n            ${INTENT_FILTER}|g" "$MANIFEST_PATH"
          else
            echo "AndroidManifest.xml not found. Skipping auto-injection (will use Capacitor defaults)."
          fi

      - name: Generate Custom Debug Keystore (Debug Key)
        run: |
          # Create keystore directory if not exists
          mkdir -p android/app/
          
          # Generate a robust debug keystore automatically with custom professional identity
          keytool -genkey -v -keystore android/app/debug.keystore \
            -alias wmqd_debug_key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Smart Watermelon Detector, OU=Development, O=Amirhossein Salari, L=Tehran, S=Tehran, C=IR"
          
          echo "Successfully generated local debug.keystore for Myket publishing preparation."

      - name: Configure Gradle Signing
        run: |
          # Customize build.gradle in android/app/ to ensure it uses the newly generated debug key
          GRADLE_PATH="android/app/build.gradle"
          if [ -f "$GRADLE_PATH" ]; then
            echo "Injecting custom debug signing configurations into build.gradle..."
            # Replace the standard debug signing configs with our own generated debug.keystore details
            sed -i "s|storeFile file('debug.keystore')|storeFile file('debug.keystore')\n            storePassword 'android'\n            keyAlias 'wmqd_debug_key'\n            keyPassword 'android'|g" "$GRADLE_PATH"
          fi

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Watermelon-Detector-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
