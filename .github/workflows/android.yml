name: Build Android App (Capacitor)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Web Dependencies
        run: |
          npm install

      - name: Build React Web App
        run: |
          npm run build

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools 29.0.3
        run: |
          if [ -n "$ANDROID_SDK_ROOT" ] && [ -f "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "build-tools;29.0.3" || true
          elif command -v sdkmanager >/dev/null 2>&1; then
            yes | sdkmanager "build-tools;29.0.3" || true
          else
            echo "sdkmanager not found in standard paths, trying default locations..."
            yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "build-tools;29.0.3" || true
          fi

      - name: Initialize Capacitor Android
        run: |
          # Ensure android platform folder is initialized and synced correctly
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Generate Custom Android App Launcher Icons & Splash Screens
        run: |
          # Convert our custom watermelon app icon to various mipmap resolutions for Android
          ICON_SRC="src/assets/images/watermelon_app_icon_1783756956652.jpg"
          ALT_ICON="src/assets/images/watermelon_icon_1783707024080.jpg"
          if [ ! -f "$ICON_SRC" ] && [ -f "$ALT_ICON" ]; then
            ICON_SRC="$ALT_ICON"
          fi
          
          if [ -f "$ICON_SRC" ]; then
            echo "Generating custom Android app launcher icons from $ICON_SRC..."
            
            # Delete default adaptive launcher icon XML files and find/delete any other ic_launcher XMLs to force Android 8+ to use our custom PNG launcher icons
            rm -rf android/app/src/main/res/mipmap-anydpi-v26
            find android/app/src/main/res/ -name "ic_launcher*.xml" -delete
            
            # Ensure target directories exist
            mkdir -p android/app/src/main/res/mipmap-mdpi
            mkdir -p android/app/src/main/res/mipmap-hdpi
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            mkdir -p android/app/src/main/res/mipmap-xxhdpi
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi
            mkdir -p android/app/src/main/res/drawable
            
            # Generate Standard, Round, and Foreground Launcher Icons
            convert "$ICON_SRC" -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert "$ICON_SRC" -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
            convert "$ICON_SRC" -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png
            
            convert "$ICON_SRC" -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert "$ICON_SRC" -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
            convert "$ICON_SRC" -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
            
            convert "$ICON_SRC" -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert "$ICON_SRC" -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
            convert "$ICON_SRC" -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
            
            convert "$ICON_SRC" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert "$ICON_SRC" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
            convert "$ICON_SRC" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
            
            convert "$ICON_SRC" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            convert "$ICON_SRC" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
            convert "$ICON_SRC" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png
            
            # Generate Fallback Splash Screen
            convert "$ICON_SRC" -resize 512x512 android/app/src/main/res/drawable/splash.png
            
            # Generate Portrait Splash Screens
            mkdir -p android/app/src/main/res/drawable-port-mdpi
            convert "$ICON_SRC" -resize 150x150 -background "#ffffff" -gravity center -extent 320x480 android/app/src/main/res/drawable-port-mdpi/splash.png
            
            mkdir -p android/app/src/main/res/drawable-port-hdpi
            convert "$ICON_SRC" -resize 200x200 -background "#ffffff" -gravity center -extent 480x800 android/app/src/main/res/drawable-port-hdpi/splash.png
            
            mkdir -p android/app/src/main/res/drawable-port-xhdpi
            convert "$ICON_SRC" -resize 300x300 -background "#ffffff" -gravity center -extent 720x1280 android/app/src/main/res/drawable-port-xhdpi/splash.png
            
            mkdir -p android/app/src/main/res/drawable-port-xxhdpi
            convert "$ICON_SRC" -resize 400x400 -background "#ffffff" -gravity center -extent 960x1600 android/app/src/main/res/drawable-port-xxhdpi/splash.png
            
            mkdir -p android/app/src/main/res/drawable-port-xxxhdpi
            convert "$ICON_SRC" -resize 512x512 -background "#ffffff" -gravity center -extent 1280x1920 android/app/src/main/res/drawable-port-xxxhdpi/splash.png
            
            # Generate Landscape Splash Screens
            mkdir -p android/app/src/main/res/drawable-land-mdpi
            convert "$ICON_SRC" -resize 150x150 -background "#ffffff" -gravity center -extent 480x320 android/app/src/main/res/drawable-land-mdpi/splash.png
            
            mkdir -p android/app/src/main/res/drawable-land-hdpi
            convert "$ICON_SRC" -resize 200x200 -background "#ffffff" -gravity center -extent 800x480 android/app/src/main/res/drawable-land-hdpi/splash.png
            
            mkdir -p android/app/src/main/res/drawable-land-xhdpi
            convert "$ICON_SRC" -resize 300x300 -background "#ffffff" -gravity center -extent 1280x720 android/app/src/main/res/drawable-land-xhdpi/splash.png
            
            mkdir -p android/app/src/main/res/drawable-land-xxhdpi
            convert "$ICON_SRC" -resize 400x400 -background "#ffffff" -gravity center -extent 1600x960 android/app/src/main/res/drawable-land-xxhdpi/splash.png
            
            mkdir -p android/app/src/main/res/drawable-land-xxxhdpi
            convert "$ICON_SRC" -resize 512x512 -background "#ffffff" -gravity center -extent 1920x1280 android/app/src/main/res/drawable-land-xxxhdpi/splash.png
            
            echo "Successfully generated and replaced all Android launcher icons and splash screens."
          else
            echo "::warning::Source app icon not found at $ICON_SRC. Skipping custom icon generation and keeping default/existing assets."
          fi

      - name: Fix and Regenerate Gradle Wrapper
        shell: bash
        run: |
          cd android
          
          if [ -s gradle/wrapper/gradle-wrapper.jar ] && jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
            echo "Valid gradle-wrapper.jar present. Skipping regeneration."
          else
            echo "gradle-wrapper.jar missing or invalid. Downloading directly from official Gradle GitHub source..."
            
            mkdir -p gradle/wrapper
            
            # آدرس مستقیم، قطعی و معتبر فایل از گیتهاب رسمی گریدل
            WRAPPER_JAR_URL="https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar"
            
            # دانلود با فلگ -L برای دنبال کردن ریدایرکتهای احتمالی گیتهاب
            curl -fsSLo gradle/wrapper/gradle-wrapper.jar --location --retry 5 --retry-delay 3 --max-time 120 "$WRAPPER_JAR_URL"
            
            if jar tf gradle/wrapper/gradle-wrapper.jar >/dev/null 2>&1; then
              echo "gradle-wrapper.jar successfully downloaded and validated OK."
            else
              echo "::error::Downloaded gradle-wrapper.jar is invalid or corrupted."
              exit 1
            fi
          fi
          
          chmod +x gradlew

      - name: Build Production Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Decode Keystore File
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEY }}" | tr -d '\r\n ' | base64 -d > android/app/release.keystore

      - name: Align and Sign APK with apksigner (v2/v3)
        run: |
          cd android/app/build/outputs/apk/release
          UNSIGNED_APK=$(ls app-release-unsigned.apk 2>/dev/null || ls *-unsigned.apk | head -n 1)
          
          ZIPALIGN_PATH=$(find $ANDROID_HOME/build-tools/ -name "zipalign" | sort -V | tail -n 1)
          APKSIGNER_PATH=$(find $ANDROID_HOME/build-tools/ -name "apksigner" | sort -V | tail -n 1)
          
          $ZIPALIGN_PATH -v 4 $UNSIGNED_APK aligned-app.apk
          
          $APKSIGNER_PATH sign --ks ../../../../release.keystore \
            --ks-key-alias "${{ secrets.ANDROID_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEY_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out Smart-Watermelon-Detector-Signed.apk aligned-app.apk
          
          $APKSIGNER_PATH verify Smart-Watermelon-Detector-Signed.apk

      - name: Upload Signed Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Watermelon-Detector-Release-APK
          path: android/app/build/outputs/apk/release/Smart-Watermelon-Detector-Signed.apk
